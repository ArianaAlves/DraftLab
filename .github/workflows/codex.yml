name: Director Mode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *" # todo dia 10h

jobs:
  run-director:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Codex Director Mode
        run: |
          codex run --prompt-file .codex/prompts/director_prompt.txt

      - name: Commit changes
        run: |
          git config --global user.name "codex-bot"
          git config --global user.email "codex@bot.com"
          git add .
          git commit -m "🤖 Director Mode updates"
          git push
